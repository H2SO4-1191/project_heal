<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Find Your Doctor</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1 class="logo">MediCare</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Find Doctors</a>
                <a href="my-appointments.html" class="nav-link" id="myAppointmentsLink">My Appointments</a>
                <div class="auth-section" id="authSection">
                    <a href="auth.html" class="btn btn-outline">Login</a>
                </div>
                <div class="user-section hidden" id="userSection">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h2 class="hero-title">Find the right doctor,<br>for the right care</h2>
                <p class="hero-subtitle">Browse our network of experienced healthcare professionals</p>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="filters-section">
                <div class="search-box">
                    <input type="text" id="nameFilter" placeholder="Search by doctor name..." class="search-input">
                </div>
                <div class="search-box">
                    <input type="text" id="specialtyFilter" placeholder="Search by specialty..." class="search-input">
                </div>
                <button class="btn btn-primary" id="searchBtn">Search</button>
                <button class="btn btn-secondary" id="clearBtn">Clear Filters</button>
            </div>

            <div class="doctors-grid" id="doctorsGrid">
                <!-- Doctor cards will be inserted here -->
            </div>

            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p>Loading doctors...</p>
            </div>

            <div class="empty-state hidden" id="emptyState">
                <p>No doctors found matching your criteria.</p>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
