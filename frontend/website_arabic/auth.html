<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول / إنشاء حساب - ميديكير</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">
          <h1 class="logo">ميديكير</h1>
        </div>
        <div class="nav-links">
          <a href="index.html" class="nav-link">الأطباء</a>
        </div>
      </div>
    </nav>

    <main class="auth-main">
      <div class="auth-container">
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab">تسجيل الدخول</button>
          <button class="auth-tab" id="signupTab">إنشاء حساب</button>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div class="auth-form" id="loginForm">
          <h2 class="auth-title">أهلاً بعودتك</h2>
          <p class="auth-subtitle">أدخل بريدك الإلكتروني لاستلام رمز تحقق</p>

          <form id="loginFormElement">
            <div class="form-group">
              <label for="loginEmail">البريد الإلكتروني</label>
              <input type="email" id="loginEmail" class="form-input" required />
            </div>

            <div class="otp-section hidden" id="loginOtpSection">
              <div class="form-group">
                <label for="loginOtp">أدخل رمز التحقق</label>
                <input type="text" id="loginOtp" class="form-input" maxlength="6" placeholder="000000" />
              </div>
              <p class="otp-info">تحقق من وحدة التحكم للحصول على رمز التحقق</p>
            </div>

            <button type="submit" class="btn btn-primary btn-large" id="loginSubmitBtn">
              طلب رمز التحقق
            </button>
          </form>
        </div>

        <!-- نموذج إنشاء الحساب -->
        <div class="auth-form hidden" id="signupForm">
          <h2 class="auth-title">إنشاء حساب جديد</h2>
          <p class="auth-subtitle">سجّل كمريض</p>

          <form id="signupFormElement">
            <div class="form-group">
              <label for="signupEmail">البريد الإلكتروني</label>
              <input type="email" id="signupEmail" class="form-input" required />
            </div>

            <div class="form-group">
              <label for="signupName">الاسم الكامل</label>
              <input type="text" id="signupName" class="form-input" required />
            </div>

            <div class="form-group">
              <label for="signupPhone">رقم الهاتف</label>
              <input type="tel" id="signupPhone" class="form-input" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="signupBirth">تاريخ الميلاد</label>
                <input type="date" id="signupBirth" class="form-input" required />
              </div>

              <div class="form-group">
                <label for="signupGender">الجنس</label>
                <select id="signupGender" class="form-input" required>
                  <option value="">اختر...</option>
                  <option value="male">ذكر</option>
                  <option value="female">أنثى</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="signupDiseases">الأمراض المزمنة (اختياري)</label>
              <textarea id="signupDiseases" class="form-input" rows="3" placeholder="مثال: السكري، ضغط الدم"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-large">إنشاء حساب</button>
          </form>
        </div>

        <div class="auth-message hidden" id="authMessage"></div>
      </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth-page.js"></script>
  </body>
</html>
