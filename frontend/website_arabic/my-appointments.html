<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواعيدي - ميديكير</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1 class="logo">ميديكير</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">الأطباء</a>
                <a href="my-appointments.html" class="nav-link active">مواعيدي</a>
                <div class="user-section" id="userSection">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">تسجيل الخروج</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <h2 class="page-title">مواعيدي</h2>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>جارٍ تحميل المواعيد...</p>
            </div>

            <div class="appointments-list hidden" id="appointmentsList"></div>

            <div class="empty-state hidden" id="emptyState">
                <p>ليس لديك أي مواعيد حتى الآن.</p>
                <a href="index.html" class="btn btn-primary">ابحث عن طبيب</a>
            </div>
        </div>
    </main>

    <!-- نافذة تفاصيل الموعد -->
    <div class="modal hidden" id="appointmentModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>تفاصيل الموعد</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/my-appointments.js"></script>
</body>
</html>
