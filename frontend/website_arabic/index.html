<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميديكير - ابحث عن طبيبك</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1 class="logo">ميديكير</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">الأطباء</a>
                <a href="my-appointments.html" class="nav-link" id="myAppointmentsLink">مواعيدي</a>
                <div class="auth-section" id="authSection">
                    <a href="auth.html" class="btn btn-outline">تسجيل الدخول</a>
                </div>
                <div class="user-section hidden" id="userSection">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">تسجيل الخروج</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h2 class="hero-title">ابحث عن الطبيب المناسب،<br>للرعاية الصحية المثالية</h2>
                <p class="hero-subtitle">تصفّح شبكتنا من أمهر المتخصصين في الرعاية الصحية</p>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="filters-section">
                <div class="search-box">
                    <input type="text" id="nameFilter" placeholder="ابحث باسم الطبيب..." class="search-input">
                </div>
                <div class="search-box">
                    <input type="text" id="specialtyFilter" placeholder="ابحث بالتخصص..." class="search-input">
                </div>
                <button class="btn btn-primary" id="searchBtn">بحث</button>
                <button class="btn btn-secondary" id="clearBtn">مسح الفلاتر</button>
            </div>

            <div class="doctors-grid" id="doctorsGrid"></div>

            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p>جارٍ تحميل الأطباء...</p>
            </div>

            <div class="empty-state hidden" id="emptyState">
                <p>لا يوجد أطباء مطابقون لمعايير بحثك.</p>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
